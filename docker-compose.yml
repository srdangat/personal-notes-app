services:
  db:
    image: postgres:16-alpine           
    container_name: notes_db
    ports:
      - "5432:5432"
    restart: always
    env_file:
      - .env
    volumes:
      - notes_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - notes_network
    labels:
      tier: "database"

  app:
    image: sanketdangat11/notes-app:v1.0                         
    container_name: notes_app
    ports:
      - "5000:5000"                  
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FLASK_RUN_HOST: "0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notes_network
    labels:
      tier: "backend"


volumes:
  notes_data:


networks:
  notes_network:
    driver: bridge
