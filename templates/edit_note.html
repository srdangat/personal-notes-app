{% extends "base.html" %}

{% block title %}Edit "{{ note.title }}" — Personal Notes App{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-header">
        <a href="{{ url_for('index') }}" class="back-link" id="back-to-home-edit-link">← Back to Notes</a>
        <h1 class="form-title">Edit Note</h1>
        <p class="form-subtitle">
            Last updated: {{ note.formatted_updated() }}
        </p>
    </div>

    <div class="form-card">
        <form action="{{ url_for('edit_note', note_id=note.id) }}" method="POST" id="edit-note-form" novalidate>

            <div class="form-group">
                <label for="note-title" class="form-label">Title</label>
                <input type="text" id="note-title" name="title" class="form-input"
                    placeholder="Give your note a clear title…" value="{{ note.title }}" maxlength="200" required
                    autofocus aria-required="true" aria-describedby="title-hint">
                <span id="title-hint" class="field-hint">Max 200 characters</span>
            </div>

            <div class="form-group">
                <label for="note-content" class="form-label">Content</label>
                <textarea id="note-content" name="content" class="form-textarea" placeholder="Write the note content…"
                    rows="12" required aria-required="true"
                    aria-describedby="content-counter">{{ note.content }}</textarea>
                <span id="content-counter" class="field-hint char-counter">0 words</span>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('index') }}" class="btn btn--secondary" id="cancel-edit-btn">Cancel</a>
                <button type="submit" class="btn btn--primary" id="submit-edit-btn">
                    💾 Update Note
                </button>
            </div>
        </form>

        <!-- Danger zone -->
        <div class="danger-zone">
            <p class="danger-label">⚠️ Danger Zone</p>
            <form action="{{ url_for('delete_note', note_id=note.id) }}" method="POST"
                onsubmit="return confirm('Permanently delete this note? This cannot be undone.');">
                <button type="submit" class="btn btn--danger" id="delete-from-edit-btn">
                    🗑️ Delete This Note
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const textarea = document.getElementById('note-content');
    const counter = document.getElementById('content-counter');
    function updateCounter() {
        const words = textarea.value.trim() ? textarea.value.trim().split(/\s+/).length : 0;
        counter.textContent = words + ' word' + (words !== 1 ? 's' : '');
    }
    textarea.addEventListener('input', updateCounter);
    updateCounter();
</script>
{% endblock %}
