name: Docker Build & Push
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker Tag, Push to Dockerhub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME  }}/personal-notes-app:${{ github.ref_name }}
            ${{ vars.DOCKERHUB_USERNAME  }}/personal-notes-app:latest
            ${{ vars.DOCKERHUB_USERNAME  }}/personal-notes-app:${{ github.sha}}
